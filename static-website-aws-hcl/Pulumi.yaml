name: ${PROJECT}
description: ${DESCRIPTION}
runtime: hcl
template:
  description: A Pulumi HCL program to deploy a static website on AWS
  config:
    aws:region:
      description: The AWS region to deploy into
      default: us-west-2
    path:
      description: The path to the folder containing the website
      default: ./www
    index_document:
      description: The file to use for top-level pages
      default: index.html
    error_document:
      description: The file to use for error pages
      default: error.html
