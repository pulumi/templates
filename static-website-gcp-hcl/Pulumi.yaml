name: ${PROJECT}
description: ${DESCRIPTION}
runtime: hcl
template:
  description: A Pulumi HCL program to deploy a static website on Google Cloud
  config:
    google:project:
      description: The Google Cloud project to deploy into
    path:
      description: The path to the folder containing the website
      default: ./www
    index_document:
      description: The file to use for top-level pages
      default: index.html
    error_document:
      description: The file to use for error pages
      default: error.html
