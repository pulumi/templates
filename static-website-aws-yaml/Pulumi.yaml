name: ${PROJECT}
description: ${DESCRIPTION}
runtime: yaml

template:
  description: A Pulumi YAML program to deploy a static website on AWS
  config:
    aws:region:
      description: The AWS region to deploy into
      default: us-west-2
    path:
      description: The path to the folder containing the website
      default: www
    indexDocument:
      description: The file to use for top-level pages
      default: index.html
    errorDocument:
      description: The file to use for error pages
      default: error.html

# Import the program's configuration settings.
config:
  path:
    type: string
    default: www
  indexDocument:
    type: string
    default: index.html
  errorDocument:
    type: string
    default: error.html

resources:

  # Create a private S3 bucket to hold the website content.
  bucket:
    type: aws:s3:Bucket

  # Block all public access to the bucket; CloudFront will reach it via OAC.
  public-access-block:
    type: aws:s3:BucketPublicAccessBlock
    properties:
      bucket: ${bucket.id}
      blockPublicAcls: true
      blockPublicPolicy: true
      ignorePublicAcls: true
      restrictPublicBuckets: true

  # Sync the website files to the bucket as private objects.
  bucket-folder:
    type: synced-folder:index:S3BucketFolder
    options:
      dependsOn:
        - ${public-access-block}
    properties:
      acl: private
      bucketName: ${bucket.bucket}
      path: ${path}

  # Create an Origin Access Control so CloudFront can read from the private bucket.
  origin-access-control:
    type: aws:cloudfront:OriginAccessControl
    properties:
      originAccessControlOriginType: s3
      signingBehavior: always
      signingProtocol: sigv4

  # Create a CloudFront CDN to distribute and cache the website.
  cdn:
    type: aws:cloudfront:Distribution
    properties:
      enabled: true
      defaultRootObject: ${indexDocument}
      origins:
        - originId: ${bucket.arn}
          domainName: ${bucket.bucketRegionalDomainName}
          originAccessControlId: ${origin-access-control.id}
      defaultCacheBehavior:
        targetOriginId: ${bucket.arn}
        viewerProtocolPolicy: redirect-to-https
        allowedMethods:
          - GET
          - HEAD
          - OPTIONS
        cachedMethods:
          - GET
          - HEAD
          - OPTIONS
        compress: true
        # Managed-CachingOptimized
        cachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        # Managed-SecurityHeadersPolicy
        responseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03
      priceClass: PriceClass_100
      customErrorResponses:
        - errorCode: 404
          responseCode: 404
          responsePagePath: /${errorDocument}
      restrictions:
        geoRestriction:
          restrictionType: none
      viewerCertificate:
        cloudfrontDefaultCertificate: true

  # Grant the CloudFront distribution permission to read objects from the bucket.
  bucket-policy:
    type: aws:s3:BucketPolicy
    properties:
      bucket: ${bucket.id}
      policy:
        fn::toJSON:
          Version: "2012-10-17"
          Statement:
            - Sid: AllowCloudFrontServicePrincipalReadOnly
              Effect: Allow
              Principal:
                Service: cloudfront.amazonaws.com
              Action: s3:GetObject
              Resource: ${bucket.arn}/*
              Condition:
                StringEquals:
                  "AWS:SourceArn": ${cdn.arn}

# Export the URLs and hostnames of the bucket and distribution.
outputs:
  originHostname: ${bucket.bucketRegionalDomainName}
  cdnURL: https://${cdn.domainName}
  cdnHostname: ${cdn.domainName}
